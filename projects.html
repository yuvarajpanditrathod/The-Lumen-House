    <style>
        .filter-menu-container::-webkit-scrollbar {
            display: none;
        }

        .filter-btn {
            font-family: 'Manrope', sans-serif;
            outline: none;
        }

        .filter-btn.active {
            background-color: rgba(212, 163, 115, 0.15) !important;
            border-color: rgba(212, 163, 115, 0.4) !important;
            color: #D4A373 !important;
        }

        .portfolio-item {
            transition: opacity 0.4s ease, transform 0.4s ease;
        }


        .sector-details {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0.68) 60%);
            color: #f3f3f3;
            padding: 0.9rem 1rem;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity .28s ease, transform .28s ease;
            font-size: 0.95rem;
            z-index: 30;
            pointer-events: none;
        }

        .group:hover .sector-details,
        .group:focus-within .sector-details {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .sector-details ul {
            margin: 0;
            padding: 0;
            list-style: none;
            display: block;
        }

        .sector-details li {
            margin: 0;
            padding: 2px 0;
            color: #f6f6f6;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .sector-details {
                font-size: 0.88rem;
                padding: 0.75rem;
            }
        }

        .sr-only {
            position: absolute !important;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }


        .hover-title {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            color: #ffffff;
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: 0.02em;
            text-align: center;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity .32s ease, transform .32s ease;
            z-index: 40;
            padding: 0 1rem;
            text-shadow: 0 6px 18px rgba(0, 0, 0, 0.5);
        }

        .group:hover .hover-title,
        .group:focus-within .hover-title {
            opacity: 1;
            transform: translateY(0);
        }


        .fly-up {
            opacity: 0;
            transform: translateY(28px);
            will-change: transform, opacity;
            transition: opacity 1s cubic-bezier(.2, .9, .2, 1), transform 1s cubic-bezier(.2, .9, .2, 1);
        }

        .fly-up.in-view {
            opacity: 1;
            transform: translateY(0);
        }


        .clean-reveal {
            opacity: 0;
            transform: translateY(18px) scale(.995);
            will-change: transform, opacity;
            transition: opacity 560ms cubic-bezier(.22, 1, .36, 1), transform 560ms cubic-bezier(.22, 1, .36, 1);
        }

        .clean-reveal.in-view {
            opacity: 1;
            transform: translateY(0) scale(1);
        }


        .group:hover .clean-reveal,
        .group:focus-within .clean-reveal {
            transform: translateY(-4px) scale(1.002);
            transition-duration: 360ms;
        }


        .group.clean-reveal {
            position: relative;
            overflow: hidden;
        }

        .group.clean-reveal::before {
            content: "";
            position: absolute;
            left: -12%;
            bottom: -18%;
            width: 320px;
            height: 320px;
            background: radial-gradient(circle at 30% 70%, rgba(212, 163, 115, 0.28) 0%, rgba(212, 163, 115, 0.18) 20%, rgba(212, 163, 115, 0.08) 38%, rgba(212, 163, 115, 0.02) 55%, transparent 70%);
            filter: blur(28px);
            transform: translateY(8px) scale(0.9);
            opacity: 0;
            transition: opacity 420ms ease, transform 560ms cubic-bezier(.22, 1, .36, 1);
            pointer-events: none;
            z-index: 10;
            mix-blend-mode: screen;
        }


        .group.clean-reveal:hover::before,
        .group.clean-reveal.in-view::before {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        @media (prefers-reduced-motion: reduce) {
            .group.clean-reveal::before {
                transition: none;
                opacity: 1;
            }
        }


        .svc-card-light {
            background: #fbf8f4;

            border: 1px solid rgba(31, 27, 22, 0.06);
            box-shadow: 0 8px 18px rgba(4, 6, 8, 0.06);
            color: #1f1b16;
        }

        .svc-num {
            font-family: 'Playfair Display', 'Cormorant Garamond', serif;
            font-size: 42px;
            line-height: 1;
            color: rgba(60, 56, 54, 0.85);
            font-weight: 400;
            min-width: 56px;
        }

        .svc-title {
            color: #111827;
            font-weight: 700;
        }

        .svc-desc {
            color: rgba(31, 27, 22, 0.62);
            font-size: 14px;
        }

        .svc-card-light:hover {
            transform: translateY(-6px);
            border-color: rgba(212, 163, 115, 0.28);
            box-shadow: 0 20px 40px rgba(11, 15, 20, 0.06), 0 6px 22px rgba(212, 163, 115, 0.04);
        }


        .svc-card-light .icon-wrap {
            width: 48px;
            height: 48px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.03);
            transition: transform .28s ease, box-shadow .28s ease, background .28s ease;
            color: rgba(236, 158, 91, 0.95);
            flex-shrink: 0;
        }

        .svc-card-light .icon-wrap svg {
            transition: transform .28s ease, filter .28s ease, opacity .28s ease;
            opacity: 0.95;
        }

        .svc-card-light:hover .icon-wrap {
            transform: translateY(-4px) scale(1.06);
            box-shadow: 0 10px 30px rgba(236, 158, 91, 0.12), 0 0 18px rgba(236, 158, 91, 0.10);
            background: linear-gradient(180deg, rgba(236, 158, 91, 0.06), rgba(236, 158, 91, 0.03));
        }

        .svc-card-light:hover .icon-wrap svg {
            filter: drop-shadow(0 6px 18px rgba(236, 158, 91, 0.18));
            transform: translateY(-1px) scale(1.02);
        }


        .svc-card-light .svc-title {
            color: #0f1724;
            font-weight: 700;
        }

        .svc-card-light .svc-desc {
            color: rgba(15, 23, 36, 0.65);
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .hover-title {
                font-size: 1.05rem;
            }
        }


        .card-media {
            transition: transform .32s ease, filter .32s ease;
            display: block;
        }

        .group:hover .card-media,
        .group:focus-within .card-media {
            filter: blur(3px) brightness(0.48) grayscale(40%);
            transform: scale(1.02);
        }


        .svc-card-light {
            background: linear-gradient(180deg, rgba(255, 252, 247, 0.96) 0%, rgba(255, 250, 244, 0.96) 100%);
            border: 1px solid rgba(0, 0, 0, 0.04);
            box-shadow: 0 8px 30px rgba(11, 14, 16, 0.18);
            color: #111827;
        }

        .svc-num {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 700;
            font-size: 56px;
            line-height: 1;
            color: rgba(16, 24, 40, 0.14);
            letter-spacing: -1px;
            min-width: 72px;
            text-align: left;
        }

        .svc-title {
            color: #0f172a;
            font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
            font-weight: 600;
        }

        .svc-desc {
            color: #334155;
            font-size: 0.95rem;
            margin-top: 6px;
        }


        .clean-reveal {
            transform: translateY(12px) scale(.998);
            opacity: 0;
            will-change: transform, opacity;
            transition: transform 560ms cubic-bezier(.2, .9, .25, 1), opacity 420ms ease;
        }

        .clean-reveal.in-view {
            transform: translateY(0) scale(1);
            opacity: 1;
        }


        .group.clean-reveal::before {
            content: "";
            position: absolute;
            left: -40px;
            bottom: -40px;
            width: 260px;
            height: 260px;
            pointer-events: none;
            border-radius: 50%;
            background: radial-gradient(closest-side, rgba(255, 236, 214, 0.9), rgba(255, 236, 214, 0.45) 30%, rgba(255, 236, 214, 0.05) 60%, transparent 70%);
            transform: translate3d(0, 12px, 0) scale(.98);
            filter: blur(18px);
            opacity: 0;
            mix-blend-mode: screen;
            transition: opacity 420ms ease, transform 420ms ease;
            z-index: 0;
        }

        .group.clean-reveal.in-view::before,
        .group.clean-reveal:hover::before {
            opacity: 1;
            transform: translate3d(0, 0, 0) scale(1);
        }

        @media (prefers-reduced-motion: reduce) {

            .clean-reveal,
            .group.clean-reveal::before {
                transition: none !important;
            }
        }
    </style>
    <script src="transition.js"></script>
</head>

    <script>

        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                navbar.classList.add('border-white/10', 'shadow-lg');
                navbar.classList.remove('border-transparent');
            } else {
                navbar.classList.remove('border-white/10', 'shadow-lg');
                navbar.classList.add('border-transparent');
            }
        });


        const footer = document.getElementById('contact');
        const lightButtons = document.querySelectorAll('[data-light-toggle="true"]');
        lightButtons.forEach((button) => {
            button.addEventListener('click', () => {
                const isOn = footer.classList.contains('light-on');
                footer.classList.toggle('light-on', !isOn);
                footer.classList.toggle('light-off', isOn);
                lightButtons.forEach(b => {
                    b.classList.toggle('active', !isOn);
                    b.blur();
                });
            });
        });


        (function () {
            const items = document.querySelectorAll('.fly-up, .clean-reveal');
            if (!items.length) return;
            const io = new IntersectionObserver((entries, obs) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {

                        const index = Array.from(items).indexOf(entry.target);
                        const delay = Math.min(index * 90, 450);
                        setTimeout(() => {
                            entry.target.classList.add('in-view');
                        }, delay);
                        obs.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.12 });
            items.forEach(it => io.observe(it));
        })();


        document.addEventListener('DOMContentLoaded', () => {
            const filterBtns = document.querySelectorAll('.filter-btn');
            const grid = document.getElementById('portfolio-grid');


            const defaultImages = {
                'hospitality': [{ src: 'https://picsum.photos/seed/hospitality-sector/800/600', caption: 'Hospitality Center' }],
                'infrastructure': [{ src: 'https://picsum.photos/seed/infrastructure-light/800/600', caption: 'Infrastructure Link' }],
                'healthcare': [{ src: 'https://picsum.photos/seed/healthcare-medical/800/600', caption: 'Healthcare Facility' }],
                'retail': [{ src: 'https://picsum.photos/seed/retail-office-space/800/600', caption: 'Retail Space' }],
                'outdoor-landscape': [{ src: 'https://picsum.photos/seed/outdoor-landscape-garden/800/600', caption: 'Landscape' }],
                'outdoor-urban': [{ src: 'https://picsum.photos/seed/urban-street-light/800/600', caption: 'Street Lighting' }],
                'outdoor-facade': [{ src: 'https://picsum.photos/seed/facade-lighting/800/600', caption: 'Facade' }],
                'museums': [{ src: 'https://picsum.photos/seed/museum-gallery-art/800/600', caption: 'Gallery Array' }],
                'private-residences': [{ src: 'https://picsum.photos/seed/private-residence-luxury/800/600', caption: 'Private Residence' }]
            };

            function renderGrid(filter) {

                grid.innerHTML = '';

                if (filter === 'all') {

                    grid.className = "grid md:grid-cols-2 gap-x-8 gap-y-16";
                    const template = document.getElementById('all-category-template');
                    if (template) {
                        grid.innerHTML = template.innerHTML;


                        const newItems = grid.querySelectorAll('.fly-up, .clean-reveal');
                        if (newItems.length > 0 && window.IntersectionObserver) {
                            const itemsArr = Array.from(newItems);
                            const io = new IntersectionObserver((entries, obs) => {
                                entries.forEach(entry => {
                                    if (entry.isIntersecting) {
                                        const index = itemsArr.indexOf(entry.target);
                                        setTimeout(() => {
                                            entry.target.classList.add('in-view');
                                            entry.target.style.opacity = '1';
                                            entry.target.style.transform = 'translateY(0)';
                                        }, Math.min(index * 90, 450));
                                        obs.unobserve(entry.target);
                                    }
                                });
                            }, { threshold: 0.12 });
                            newItems.forEach(it => io.observe(it));
                        }
                    }
                    return;
                }


                grid.className = "grid sm:grid-cols-2 md:grid-cols-3 gap-6 md:gap-10 mt-4";


                const storedData = localStorage.getItem('lumen-house-gallery');
                let galleryData = storedData ? JSON.parse(storedData) : null;


                if (!galleryData || Object.keys(galleryData).length === 0) {
                    galleryData = defaultImages;
                }

                let itemsToRender = [];


                if (galleryData[filter]) {
                    galleryData[filter].forEach(img => {
                        itemsToRender.push({ ...img, category: filter });
                    });
                }

                if (itemsToRender.length === 0) {
                    grid.innerHTML = '<div class="col-span-full text-center text-gray-500 py-12">No images published for this sector yet.</div>';
                    return;
                }


                itemsToRender.forEach((item, index) => {
                    const card = document.createElement('div');
                    card.className = `group cursor-pointer portfolio-item`;
                    card.setAttribute('data-category', item.category);


                    card.style.opacity = '0';
                    card.style.transform = 'translateY(20px)';
                    card.style.transition = 'opacity 0.6s ease, transform 0.6s ease';

                    card.innerHTML = `
                        <div class="overflow-hidden rounded-2xl mb-5 border border-black/5">
                            <img src="${item.src}" alt="${item.caption}"
                                class="w-full aspect-[4/3] object-cover">
                        </div>
                        <div class="px-1">
                            <h4 class="text-white text-lg font-medium">${item.caption}</h4>
                        </div>
                    `;
                    grid.appendChild(card);


                    setTimeout(() => {
                        card.style.opacity = '1';
                        card.style.transform = 'translateY(0)';
                    }, 50 * index);
                });
            }


            renderGrid('all');

            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => {
                        b.classList.remove('active', 'border-white/20', 'bg-white/10', 'text-white');
                        b.classList.add('border-white/10', 'text-gray-400');
                    });
                    btn.classList.add('active', 'border-white/20', 'text-white');
                    btn.classList.remove('border-white/10', 'text-gray-400');

                    const filter = btn.getAttribute('data-filter');
                    renderGrid(filter);
                });
            });
        });
    </script>
